<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #111122;
      color: #d0d0e0;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .header-icon {
      font-size: 28px;
    }
    .header-text h1 {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
    }
    .header-text p {
      font-size: 11px;
      color: #666;
    }
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 10px;
      margin-bottom: 14px;
      font-size: 13px;
      font-weight: 600;
    }
    .status-none {
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      color: #666;
    }
    .status-possible {
      background: #f59e0b15;
      border: 1px solid #f59e0b40;
      color: #f59e0b;
    }
    .status-likely, .status-confirmed {
      background: #ef444415;
      border: 1px solid #ef444440;
      color: #ef4444;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-none { background: #444; }
    .dot-possible { background: #f59e0b; }
    .dot-likely, .dot-confirmed { background: #ef4444; animation: pulse 1.5s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .url {
      font-size: 11px;
      color: #555;
      margin-bottom: 14px;
      word-break: break-all;
      font-family: "SF Mono", monospace;
    }
    .signals-section {
      background: #0d0d1a;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 14px;
    }
    .signals-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #555;
      margin-bottom: 8px;
    }
    .signal-item {
      font-size: 11px;
      font-family: "SF Mono", monospace;
      padding: 4px 0;
      border-bottom: 1px solid #1a1a2e;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .signal-item:last-child { border-bottom: none; }
    .signal-type {
      font-size: 9px;
      text-transform: uppercase;
      background: #1a1a2e;
      padding: 2px 6px;
      border-radius: 4px;
      color: #888;
      flex-shrink: 0;
    }
    .signal-platform {
      font-size: 9px;
      text-transform: uppercase;
      background: #2a1a3e;
      padding: 2px 6px;
      border-radius: 4px;
      color: #a78bfa;
      flex-shrink: 0;
    }
    .signal-detail {
      color: #aaa;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .no-signals {
      font-size: 12px;
      color: #444;
      text-align: center;
      padding: 16px 0;
    }
    .footer {
      font-size: 10px;
      color: #444;
      text-align: center;
      padding-top: 8px;
      line-height: 1.6;
    }
    .footer a {
      color: #6366f1;
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-icon">&#128737;&#65039;</span>
    <div class="header-text">
      <h1>Breach Detector</h1>
      <p>Security incident awareness</p>
    </div>
  </div>

  <div id="status" class="status-bar status-none">
    <span class="dot dot-none" id="dot"></span>
    <span id="status-text">Checking…</span>
  </div>

  <div class="url" id="url"></div>

  <div class="signals-section">
    <div class="signals-title">Detection Signals</div>
    <div id="signals-list">
      <div class="no-signals">No signals found</div>
    </div>
  </div>

  <div class="footer">
    Built by <a href="https://maestrolabs.com" target="_blank">Maestro Labs</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
